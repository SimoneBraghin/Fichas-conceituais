<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas Conceituais — Doutorado PPGPol</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0e11;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: #252830;
    --accent: #c8a96e;
    --accent2: #7b9e87;
    --accent3: #8b6fa8;
    --text: #d4d8e2;
    --text-muted: #7a7f8e;
    --text-dim: #4a4f5e;
    --red: #c0614d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 48px 64px 40px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    line-height: 1.1;
    color: #eef0f5;
    margin-bottom: 8px;
  }
  .header h1 span { color: var(--accent); font-style: italic; }
  .header-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 16px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .header-sub span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .dot.green { background: var(--accent2); }
  .dot.purple { background: var(--accent3); }
  .dot.red { background: var(--red); }

  .back-btn {
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(200,169,110,0.08);
    border: 1px solid rgba(200,169,110,0.25);
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 20px;
  }
  .back-btn:hover { background: rgba(200,169,110,0.15); }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 64px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .section-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    min-width: 36px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #eef0f5;
  }
  .section-tag {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border-radius: 2px;
    background: rgba(200,169,110,0.12);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.25);
  }

  .file-list { display: flex; flex-direction: column; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface);
    cursor: pointer;
    transition: background .15s;
  }
  .file-item:last-child { border-bottom: 1px solid var(--border); }
  .file-item:hover { background: var(--surface2); }
  .file-tipo {
    min-width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    border-right: 1px solid var(--border);
    align-self: stretch;
  }
  .file-content {
    padding: 14px 18px;
    font-size: 13.5px;
    color: var(--text);
    flex: 1;
  }
  .file-name { color: #eef0f5; font-weight: 500; }
  .file-arrow {
    padding: 0 18px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  .status-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    padding: 20px 0;
  }
  .status-msg.error { color: var(--red); }

  #viewerView { display: none; }
  #viewerView iframe {
    width: 100%;
    height: calc(100vh - 240px);
    min-height: 500px;
    border: 1px solid var(--border);
    background: #fff;
    display: block;
  }

  .footer {
    border-top: 1px solid var(--border);
    padding: 20px 64px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Repositório · doutoradoPPGPol</div>
  <h1 id="titulo">Fichas <span>Conceituais</span></h1>
  <div class="header-sub">
    <span><span class="dot"></span>Índice gerado automaticamente</span>
    <span><span class="dot green"></span>Atualiza a cada acesso</span>
    <span><span class="dot purple"></span><span id="contador">— arquivos</span></span>
  </div>
  <button class="back-btn" id="backBtn" onclick="mostrarLista()">← VOLTAR À LISTA</button>
</div>

<div class="container">

  <div id="listView">
    <div class="section-header">
      <span class="section-num">01</span>
      <span class="section-title">Arquivos Disponíveis</span>
      <span class="section-tag">GITHUB API</span>
    </div>
    <p class="status-msg" id="status">Carregando lista de arquivos do GitHub...</p>
    <div class="file-list" id="fileList"></div>
  </div>

  <div id="viewerView">
    <div class="section-header">
      <span class="section-num">02</span>
      <span class="section-title" id="arquivoAtual">—</span>
      <span class="section-tag" style="background:rgba(123,158,135,0.12);color:var(--accent2);border-color:rgba(123,158,135,0.25);">VISUALIZANDO</span>
    </div>
    <iframe id="frame"></iframe>
  </div>

</div>

<div class="footer">
  <div>ÍNDICE · FICHAS CONCEITUAIS · GITHUB PAGES</div>
  <div id="footerInfo">—</div>
</div>

<script>
  // ================================================================
  // CONFIGURAÇÃO — edite estas 3 linhas com os dados do repositório
  // ================================================================
  const OWNER  = "SimoneBraghin";        // usuário/organização do GitHub
  const REPO   = "Fichas-conceituais"; // nome do repositório público
  const FOLDER = "repositorio";   // nome da pasta com os .html
  // ================================================================

  const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(FOLDER)}`;

  const statusEl     = document.getElementById("status");
  const listEl       = document.getElementById("fileList");
  const listView     = document.getElementById("listView");
  const viewerView   = document.getElementById("viewerView");
  const backBtn      = document.getElementById("backBtn");
  const arquivoAtual = document.getElementById("arquivoAtual");
  const frame        = document.getElementById("frame");
  const contador     = document.getElementById("contador");
  const footerInfo   = document.getElementById("footerInfo");

  async function carregarArquivos() {
    try {
      const resp = await fetch(apiUrl, { cache: "no-store" });

      if (!resp.ok) {
        throw new Error(
          `HTTP ${resp.status} — verifique se OWNER/REPO/FOLDER estão corretos e se o repositório é público.`
        );
      }

      const arquivos = await resp.json();
      const htmls = arquivos.filter(
        item => item.type === "file" && item.name.toLowerCase().endsWith(".html")
      );

      if (htmls.length === 0) {
        statusEl.textContent = "Nenhum arquivo .html encontrado nesta pasta.";
        return;
      }

      statusEl.remove();
      contador.textContent = `${htmls.length} arquivo(s)`;
      footerInfo.textContent = `${htmls.length} arquivo(s) · última checagem: ${new Date().toLocaleString('pt-BR')}`;

      htmls.forEach((arquivo, i) => {
        const item = document.createElement("div");
        item.className = "file-item";
        item.innerHTML = `
          <div class="file-tipo">${String(i + 1).padStart(2, '0')}</div>
          <div class="file-content"><span class="file-name">${arquivo.name}</span></div>
          <div class="file-arrow">→</div>
        `;
        const caminhoRelativo = `${FOLDER}/${arquivo.name}`;
        item.onclick = () => abrirArquivo(caminhoRelativo, arquivo.name);
        listEl.appendChild(item);
      });

    } catch (erro) {
      statusEl.classList.add("error");
      statusEl.textContent = `Erro ao carregar a lista: ${erro.message}`;
    }
  }

  function abrirArquivo(caminho, nome) {
    frame.src = caminho;
    arquivoAtual.textContent = nome;
    backBtn.style.display = "inline-block";
    listView.style.display = "none";
    viewerView.style.display = "block";
  }

  function mostrarLista() {
    frame.src = "about:blank";
    backBtn.style.display = "none";
    viewerView.style.display = "none";
    listView.style.display = "block";
  }

  carregarArquivos();
</script>

</body>
</html>
